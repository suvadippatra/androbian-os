
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AndrobianOS Cinematic Boot</title>
<style>
    /* * Core Environment
     * Engineered for a 16:10 4K aesthetic.
     */
    body, html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000000;
        color: #ffffff;
        font-family: 'Arial', sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* --- Phase 1: Primordial Spark & Orbit --- */
    
    #spark {
        position: absolute;
        width: 4px;
        height: 4px;
        background-color: #ffffff;
        border-radius: 50%;
        box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.8);
        opacity: 0;
        animation: ignite 1s ease-in-out forwards;
    }

    #orbit-system {
        position: absolute;
        width: 200px;
        height: 200px;
        opacity: 0;
        animation: fadeSystemIn 0.5s 1s forwards, orbitSpin 2s 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .orb {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 15px currentColor;
    }

    .orb-green {
        color: #a4c639;
        background-color: #a4c639;
        animation: orbSeparateGreen 2s 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .orb-red {
        color: #d70a53;
        background-color: #d70a53;
        animation: orbSeparateRed 2s 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* --- Phase 2: Crystallization --- */

    #logo-container {
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        z-index: 10;
        /* Transitions handle the Phase 3 shift up */
        transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logo-wrapper {
        width: 80px;
        height: 80px;
        opacity: 0;
        transform: scale(0);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .logo-wrapper svg {
        width: 100%;
        height: 100%;
    }

    /* Text Layer */
    #text-container {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 5;
    }

    .brand-text {
        font-size: 5vw; /* Scales dynamically with the screen */
        max-font-size: 72px;
        font-weight: bold;
        letter-spacing: 2px;
        opacity: 0;
        
        /* Sapphire Blue to Crimson Red */
        background: linear-gradient(100deg, #08306b 0%, #0f52ba 30%, #dc143c 70%, #900c3f 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        color: transparent;
        transform: scale(0.9);
    }

    /* --- Phase 3: Ambient Loading State --- */

    .subtext {
        margin-top: 5px;
        font-size: 1.2vw;
        color: #888888;
        letter-spacing: 4px;
        text-transform: lowercase;
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
    }

    #loading-status {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1vw;
        color: #666666;
        letter-spacing: 1px;
        font-family: monospace;
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
        white-space: nowrap;
    }
    #dots {
        display: inline-block;
        width: 3ch; /* Reserves exact space for 3 monospace dots */
        text-align: left;
    }
    /* --- State Management Classes (Applied via JS) --- */

    body.phase2 .logo-wrapper {
        animation: unfold 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    body.phase2 .brand-text {
        animation: textEmerge 1.5s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    body.phase3 #logo-container {
        /* Shrinks and shifts to top-center */
        transform: translateY(-12vh) scale(0.65);
    }

    body.phase3 .logo-wrapper {
        animation: uniformPulse 2s ease-in-out infinite alternate;
    }

    body.phase3 .brand-text {
        /* Activates the continuous shimmering light effect */
        background: linear-gradient(100deg, #0f52ba 20%, #dc143c 40%, #ffffff 50%, #dc143c 60%, #0f52ba 80%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        animation: glimmer 3.5s linear infinite;
        opacity: 1;
        transform: scale(1);
    }

    body.phase3 .subtext,
    body.phase3 #loading-status {
        opacity: 1;
    }


    /* --- Keyframe Choreography --- */

    @keyframes ignite {
        0% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1.5); }
        100% { opacity: 0; transform: scale(0); }
    }

    @keyframes fadeSystemIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    @keyframes orbitSpin {
        0% { transform: rotate(0deg) scale(0.5); }
        50% { transform: rotate(180deg) scale(1); }
        100% { transform: rotate(360deg) scale(0); opacity: 0; }
    }

    @keyframes orbSeparateGreen {
        0% { transform: translate(-50%, -50%); }
        40% { transform: translate(-100px, -50%); }
        100% { transform: translate(-50%, -50%); }
    }

    @keyframes orbSeparateRed {
        0% { transform: translate(-50%, -50%); }
        40% { transform: translate(100px, -50%); }
        100% { transform: translate(-50%, -50%); }
    }

    @keyframes unfold {
        0% { opacity: 0; transform: scale(0); filter: blur(10px); }
        100% { opacity: 1; transform: scale(1); filter: blur(0px); }
    }

    @keyframes textEmerge {
        0% { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
    }

    @keyframes glimmer {
        0% { background-position: 200% center; }
        100% { background-position: -200% center; }
    }

    @keyframes uniformPulse {
        0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        100% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
    }

</style>
</head>
<body>

    <div id="spark"></div>
    <div id="orbit-system">
        <div class="orb orb-green"></div>
        <div class="orb orb-red"></div>
    </div>



    <div id="text-container">
        <div class="brand-text">AndrobianOS</div>
        <div class="subtext">debian for Android</div>
    </div>

    <div id="loading-status">loading joydip's profile<span id="dots"></span></div>

    <script>
        // System Timeline Orchestrator
        const timeline = {
            phase2Start: 3000, // Transforms orbs into logos
            phase3Start: 6000  // Shifts layout and begins ambient loading
        };

        // Advance to Phase 2
        setTimeout(() => {
            document.body.classList.add('phase2');
        }, timeline.phase2Start);

        // Advance to Phase 3
        setTimeout(() => {
            document.body.classList.add('phase3');
            initializeLoadingDots();
        }, timeline.phase3Start);

        // Subroutine to manage the terminal-style loading indicator
        function initializeLoadingDots() {
            const dotsElement = document.getElementById('dots');
            let dotCount = 0;
            
            setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                dotsElement.textContent = '.'.repeat(dotCount);
            }, 500);
        }
    </script>
</body>
</html>
