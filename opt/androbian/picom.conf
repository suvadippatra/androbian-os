# /etc/picom.conf
# Picom compositor configuration for Joydip's LXQt desktop
# Provides: rounded window corners, fade transitions, subtle shadow
# Backend: xrender (safest inside proot + Termux:X11 with Turnip/Zink)
# To apply:  picom --config /etc/picom.conf &

# ─── Backend ──────────────────────────────────────────────────────────────────
backend = "xrender";
# NOTE: Try "glx" if xrender is slow — it uses Vulkan via Turnip on Adreno 740
# If glx crashes, revert to xrender.

# ─── Rounded corners (the macOS effect) ───────────────────────────────────────
corner-radius = 10;
rounded-corners-exclude = [
  "class_g = 'Plank'",         # Don't round the dock
  "class_g = 'trayer'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
];

# ─── Fading ───────────────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.08;
fade-out-step = 0.08;
fade-delta    = 4;

# ─── Opacity ──────────────────────────────────────────────────────────────────
inactive-opacity = 0.96;
active-opacity   = 1.0;
frame-opacity    = 1.0;

# Keep these fully opaque
opacity-rule = [
  "100:class_g = 'Plank'",
  "100:class_g = 'firefox'",
  "100:class_g = 'Falkon'",
];

# ─── Shadow ───────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius  = 10;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity  = 0.25;
shadow-exclude  = [
  "class_g = 'Plank'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c",
];

# ─── Performance ──────────────────────────────────────────────────────────────
vsync = false;          # Set true if you see tearing
use-damage = true;      # Only repaint changed areas — saves GPU
log-level = "warn";
